name: blueprints

services:
  eda:
    image: hpretl/iic-osic-tools:chipathon26
    container_name: blueprints-eda
    working_dir: /foss/blueprints

    environment:
      VNC_PW: "${VNC_PW:-abc123}"
      VNC_RESOLUTION: "${VNC_RESOLUTION:-1920x1200}"
      VNC_COL_DEPTH: "24"
      VNC_VIEW_ONLY: "false"

    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:5901:5901"
      - "127.0.0.1:8888:8888"

    volumes:
      - "${BLUEPRINTS_DIR:-$HOME/vlsi/blueprints}:/foss/blueprints:rw"
      - "${DESIGNS_DIR:-$HOME/eda/designs}:/foss/designs:rw"

    tmpfs:
      - /tmp:exec,mode=1777,size=8g

    shm_size: "2g"

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    security_opt:
      - seccomp:unconfined

    restart: unless-stopped
