name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repo layout
        run: |
          ls -la
      - name: Run Makefile CI smoke
        run: |
          make ci-smoke